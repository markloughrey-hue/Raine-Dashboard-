  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 4px;\n  font-variant-numeric: tabular-nums;\n}\n.gap-stat-sub { font-size: 10.5px; color: var(--slate-500); font-family: var(--font-mono); }\n\n/* ========== Donuts ========== */\n.donut-row { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 8px; }\n.donut-block { padding: 4px 0; }\n.donut-header { margin-bottom: 14px; }\n.donut-title { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 3px; letter-spacing: -0.005em; }\n.donut-sub { font-size: 11px; color: var(--slate-500); font-family: var(--font-mono); }\n.donut-svg { display: block; margin: 0 auto 14px; }\n.legend { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 18px; }\n.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--slate-700); }\n.legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }\n.legend-num { font-variant-numeric: tabular-nums; color: var(--ink); font-weight: 500; margin-left: auto; font-family: var(--font-mono); font-size: 11.5px; }\n\n/* ========== Small-multiples grid ========== */\n.smg-wrap { padding: 18px 20px 22px; }\n.smg-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 14px; }\n.smg-controls { display: flex; gap: 4px; font-family: var(--font-mono); font-size: 10px; }\n.smg-ctrl {\n  padding: 5px 9px; border-radius: 3px; cursor: pointer;\n  color: var(--slate-500); letter-spacing: 0.08em; text-transform: uppercase;\n  border: 1px solid var(--slate-200); background: white;\n  transition: all 0.15s;\n}\n.smg-ctrl:hover { color: var(--ink); border-color: var(--slate-300); }\n.smg-ctrl.active { color: var(--cred-green-dark); border-color: var(--cred-green-border); background: var(--cred-green-bg); }\n.smg-grid {\n  display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px;\n  background: var(--slate-200); border: 1px solid var(--slate-200); border-radius: 6px; overflow: hidden;\n}\n.smg-tile {\n  background: white; padding: 12px 13px  { background: var(--slate-50); color: var(--slate-700); border: 1px solid var(--slate-200); }\n.property-sub { font-size: 11px; color: var(--slate-500); margin-bottom: 16px; font-family: var(--font-mono); line-height: 1.5; }\n.property-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px; }\n.metric-label {\n  font-family: var(--font-mono); font-size: 9px; font-weight: 600;\n  color: var(--slate-500); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 5px;\n}\n.metric-value {\n  font-family: var(--font-display); font-size: 22px; font-weight: 400;\n  color: var(--ink); letter-spacing: -0.025em; line-height: 1.05;\n  font-variant-numeric: tabular-nums;\n}\n.metric-sub { font-size: 10.5px; color: var(--slate-500); margin-top: 3px; font-family: var(--font-mono); }\n\n.spark-row {\n  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\n  padding-top: 14px; border-top: 1px dotted var(--slate-200);\n}\n.spark-block { display: flex; flex-direction: column; gap: 4px; }\n.spark-head {\n  display: flex; justify-content: space-between; align-items: baseline;\n  font-family: var(--font-mono); font-size: 9.5px; color: var(--slate-500);\n  letter-spacing: 0.1em; text-transform: uppercase;\n}\n.spark-head .delta { font-size: 10px; font-weight: 600; }\n.spark-svg { width: 100%; height: 32px; display: block; }\n.spark-foot {\n  font-family: var(--font-mono); font-size: 9.5px; color: var(--slate-400);\n  display: flex; justify-content: space-between;\n}\n\n/* ========== Buyer bar chart ========== */\n.bar-chart { padding: 8px 0 2px; }\n.bar-row {\n  display: grid; grid-template-columns: 180px 1fr 100px;\n  align-items: center; gap: 14px; padding: 7px 0;\n  border-bottom: 1px dotted var(--slate-100);\n}\n.bar-row:last-child { border-bottom: 0; }\n.bar-row .nm { font-size: 12px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }\n.bar-row .nm.parent { color: var(--cred-green-darker); }\n.bar-row .nm .sub { color: var(--slate-500); font-weight: 400; font-size: 10.5px; margin-left: 4px; font-family: var(--font-mono); }\n.bar-track { height: 16px; background: var(--slate-50); border-radius: 2px; position: relative; overflow: hidden; }\n.bar-fill {\n  height: 100%; background: var(--cred-green);\n  transform-origin: left center; transform: scaleX(0);\n  animation: barIn 0.9s cubic-bezier(.2,.7,.2,1) 0.4s forwards;\n  border-radius: 2px;\n}\n.bar-fill.parent { background: var(--cred-green-darker); }\n.bar-fill.muted { background: var(--slate-400); }\n@keyframes barIn { to { transform: scaleX(var(--w, 1)); } }\n.bar-row .val { font-family: var(--font-mono); font-size: 12.5px; font-variant-numeric: tabular-nums; text-align: right; color: var(--ink); }\n\n/* ========== Nested buyer table ========== */\n.nest-tbl tbody td { padding: 9px 12px; }\n.nest-tbl .child td:first-child { padding-left: 38px; position: relative; color: var(--slate-700); font-weight: 500; }\n.nest-tbl .child td:first-child::before {\n  content: ''; position: absolute; left: 18px; top: 0; bottom: 0; width: 1px; background: var(--slate-300);\n}\n.nest-tbl .child td:first-child::after {\n  content: ''; position: absolute; left: 18px; top: 50%; width: 12px; height: 1px; background: var(--slate-300);\n}\n.nest-tbl .parent td:first-child { font-weight: 700; color: var(--cred-green-darker); }\n.nest-tbl .parent { background: linear-gradient(to right, var(--cred-green-tint), transparent 30%); }\n.fn { font-size: 10.5px; color: var(--slate-500); line-height: 1.5; margin-top: 14px; font-family: var(--font-mono); }\n.fn sup { color: var(--cred-green-dark); font-weight: 700; }\n\n/* ========== Methodology lists ========== */\n.method-list { font-size: 12.5px; color: var(--slate-700); line-height: 1.75; padding-left: 18px; margin-bottom: 22px; }\n.method-list li { margin-bottom: 4px; }\n.method-list strong { color: var(--ink); font-weight: 600; }\n.method-h {\n  font-family: var(--font-display); font-size: 18px; font-weight: 400;\n  color: var(--ink); letter-spacing: -0.01em;\n  margin: 8px 0 10px; line-height: 1.2;\n}\n\n/* ========== Footer ========== */\n.footer {\n  margin-top: 60px; padding: 20px 0;\n  border-top: 1px solid var(--slate-200);\n  font-size: 10.5px; color: var(--slate-500); font-family: var(--font-mono);\n  display: flex; justify-content: space-between; align-items: center;\n  letter-spacing: 0.04em;\n}\n\n@media (max-width: 1080px) {\n  .hero { grid-template-columns: 1fr; }\n  .hero-right { border-left: 0; padding-left: 0; border-top: 1px solid var(--slate-200); padding-top: 18px; }\n  .hero-number { font-size: 100px; }\n  .smg-grid { grid-template-columns: repeat(4, 1fr); }\n  .prop-grid { grid-template-columns: 1fr; }\n}\n@media (max-width: 820px) {\n  .kpi-grid { grid-template-columns: repeat(2, 1fr); }\n  .kpi:nth-child(2n) { border-right: 0; }\n  .kpi { border-bottom: 1px solid var(--slate-200); }\n  .kpi:nth-last-child(-n+2) { border-bottom: 0; }\n  .gap-row { grid-template-columns: 1fr; }\n  .assumption-grid { grid-template-columns: 1fr; }\n  .property-metrics { grid-template-columns: repeat(2, 1fr); }\n  .donut-row { grid-template-columns: 1fr; }\n  .smg-grid { grid-template-columns: repeat(3, 1fr); }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- BLOOMBERG-STYLE TICKER -->\n<div class=\"ticker\">\n  <div class=\"ticker-inner\" id=\"ticker\"><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"container\">\n\n  <!-- HEADER -->\n  <div class=\"header\">\n    <div class=\"header-left\">\n      <div class=\"logo\">CR<\u002Fdiv>\n      <div>\n        <div class=\"brand-line-1\">CRED Intelligence · Media Rights<\u002Fdiv>\n        <div class=\"brand-line-2\">Raine Group · Calibration Preview<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"header-right\">\n      <div class=\"tag\">SAMPLE · V1.6<\u002Fdiv>\n      <div class=\"prepared\">Prepared for <strong>Kent Hjelm<\u002Fstrong><br>The Raine Group · Thursday review<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HERO -->\n  <section class=\"hero\">\n    <div class=\"hero-left\">\n      <div class=\"hero-eyebrow\">Universe Coverage · USD Aggregate<\u002Fdiv>\n      <div class=\"hero-headline\">\n        Twenty-five leagues, nine thousand deals, indexed end-to-end and joined to engagement — <em>this is the denominator<\u002Fem> behind every $/fan and $/impression ratio downstream.\n      <\u002Fdiv>\n      <div class=\"hero-number-wrap\">\n        <div class=\"hero-number\"><span class=\"currency\">$<\u002Fspan><span class=\"big\" id=\"hero-counter\">0.00<\u002Fspan><span class=\"unit\">B<\u002Fspan><\u002Fdiv>\n        <div class=\"hero-number-label\">Aggregate annual rights value · full universe<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hero-sub\">\n        <strong>9,101 valued deals<\u002Fstrong> across <strong>25 leagues<\u002Fstrong> and <strong>39+ properties<\u002Fstrong>, joined to 27-month follower trends and 191 broadcaster × season viewership rows. Sample shown below is 100 deals weighted toward international and secondary-tier rights for calibration.\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-right\">\n      <div class=\"meta-section-title\">Scope<\u002Fdiv>\n      <div class=\"meta-row\"><span class=\"k\">Currency<\u002Fspan><span class=\"v\">USD · FX footnoted<\u002Fspan><\u002Fdiv>\n      <div class=\"meta-row\"><span class=\"k\">Coverage<\u002Fspan><span class=\"v\">1996 → present + signed forward<\u002Fspan><\u002Fdiv>\n      <div class=\"meta-row\"><span class=\"k\">Sample<\u002Fspan><span class=\"v\">5 leagues · 100 deals<\u002Fspan><\u002Fdiv>\n      <div class=\"meta-row\"><span class=\"k\">Full universe<\u002Fspan><span class=\"v\">25 leagues · 303 clubs · 9,101 deals<\u002Fspan><\u002Fdiv>\n      <div class=\"meta-section-title\" style=\"margin-top:14px;\">Wiring<\u002Fdiv>\n      <div class=\"meta-row\"><span class=\"k\">Deal table<\u002Fspan><span class=\"v\">sm_deal_media_rights<\u002Fspan><\u002Fdiv>\n      <div class=\"meta-row\"><span class=\"k\">Spend<\u002Fspan><span class=\"v\">sm_deal_spend_by_broadcaster<\u002Fspan><\u002Fdiv>\n      <div class=\"meta-row\"><span class=\"k\">Territory<\u002Fspan><span class=\"v\">sm_deal_territory_summary<\u002Fspan><\u002Fdiv>\n      <div class=\"meta-row\"><span class=\"k\">Viewership<\u002Fspan><span class=\"v\">191 broadcaster × season rows<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- KPI cascade -->\n  <div class=\"kpi-grid\">\n    <div class=\"kpi\">\n      <div class=\"kpi-label\"><span class=\"marker\"><\u002Fspan>Sample value<\u002Fdiv>\n      <div class=\"kpi-value\" data-counter=\"1.09\" data-suffix=\"B\" data-prefix=\"$\">$0.00B<\u002Fdiv>\n      <div class=\"kpi-sub\">100 deals · 5 leagues · calibration<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi\">\n      <div class=\"kpi-label\"><span class=\"marker\"><\u002Fspan>Top buyer (rollup)<\u002Fdiv>\n      <div class=\"kpi-value small\">Disney<\u002Fdiv>\n      <div class=\"kpi-sub\">$33.96B incl. ESPN, ABC subsidiaries<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi\">\n      <div class=\"kpi-label\"><span class=\"marker\"><\u002Fspan>Largest single-country<\u002Fdiv>\n      <div class=\"kpi-value small\">United States<\u002Fdiv>\n      <div class=\"kpi-sub\">$33.96B across 544 deals<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi\">\n      <div class=\"kpi-label\"><span class=\"marker\"><\u002Fspan>Forward committed (sample)<\u002Fdiv>\n      <div class=\"kpi-value\" data-counter=\"158\" data-suffix=\"M\" data-prefix=\"$\">$0M<\u002Fdiv>\n      <div class=\"kpi-sub\">15 signed forward deals · sample slice<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TABS -->\n  <div class=\"tabs-wrap\">\n    <div class=\"tabs\">\n      <div class=\"tab active\" data-tab=\"overview\"><span class=\"tab-idx\">01<\u002Fspan>Overview<\u002Fdiv>\n      <div class=\"tab\" data-tab=\"property\"><span class=\"tab-idx\">02<\u002Fspan>Property Intelligence<\u002Fdiv>\n      <div class=\"tab\" data-tab=\"efficiency\"><span class=\"tab-idx\">03<\u002Fspan>Efficiency Benchmarking<\u002Fdiv>\n      <div class=\"tab\" data-tab=\"buyer\"><span class=\"tab-idx\">04<\u002Fspan>Aggregate Buyer Spend<\u002Fdiv>\n      <div class=\"tab\" data-tab=\"territory\"><span class=\"tab-idx\">05<\u002Fspan>Territory &amp; Market<\u002Fdiv>\n      <div class=\"tab\" data-tab=\"forward\"><span class=\"tab-idx\">06<\u002Fspan>Forward Pipeline<\u002Fdiv>\n      <div class=\"tab\" data-tab=\"methodology\"><span class=\"tab-idx\">07<\u002Fspan>Methodology<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ OVERVIEW ============ -->\n  <div class=\"pane active\" id=\"pane-overview\">\n\n    <div class=\"gap-row\">\n      <div class=\"gap-card\">\n        <span class=\"gap-label\">Gap 1 · Historical Trending<\u002Fspan>\n        <div class=\"gap-title\">Historical Deal Coverage<\u002Fdiv>\n        <div class=\"gap-blurb\">Every deal has start/end dates and annual value. Trending across deal cycles is computed from successive seller–buyer pairs over time.<\u002Fdiv>\n        <div class=\"gap-stat\">1996–present<\u002Fdiv>\n        <div class=\"gap-stat-sub\">Sample range in this preview: 1997–2027<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"gap-card\">\n        <span class=\"gap-label\">Gap 2 · Forward Projections<\u002Fspan>\n        <div class=\"gap-title\">Committed Forward Deals<\u002Fdiv>\n        <div class=\"gap-blurb\">Signed contracts with known values for future cycles — actual commitments, not forecasts.<\u002Fdiv>\n        <div class=\"gap-stat\">15 in sample<\u002Fdiv>\n        <div class=\"gap-stat-sub\">$158.0M committed forward (sample only)<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"gap-card\">\n        <span class=\"gap-label\">Gap 5 · Efficiency Ratios<\u002Fspan>\n        <div class=\"gap-title\">$/Fan · $/Impression · $/Game<\u002Fdiv>\n        <div class=\"gap-blurb\">Three computed efficiency metrics per deal, joined to property engagement metrics. Methodology confirmed in your 8 Apr reply; broadcaster-level $/impression is the Phase 2 upgrade target.<\u002Fdiv>\n        <div class=\"gap-stat\">53 deals<\u002Fdiv>\n        <div class=\"gap-stat-sub\">computed in sample · league-level v1, broadcaster-level Phase 2<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <div class=\"section-header\">\n        <div>\n          <div class=\"section-eyebrow\">Sample Roster<\u002Fdiv>\n          <div class=\"section-title\">Five leagues, <em>one hundred deals<\u002Fem> — calibration cut.<\u002Fdiv>\n          <div class=\"section-sub\">Aggregate metrics shown. Deal-level rows surfaced in the full deliverable.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"sample-pill\">SAMPLE<\u002Fspan>\n      <\u002Fdiv>\n      <table>\n        <thead>\n          <tr>\n            <th>League<\u002Fth>\n            <th class=\"num\">Deals<\u002Fth>\n            <th class=\"num\">With $ value<\u002Fth>\n            <th class=\"num\">Sample total<\u002Fth>\n            <th class=\"num\">Median annual<\u002Fth>\n            <th class=\"num\">Forward-signed<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr><td class=\"league-name\">Premier League<\u002Ftd><td class=\"num\">20<\u002Ftd><td class=\"num\">17<\u002Ftd><td class=\"num\">$471.5M<\u002Ftd><td class=\"num\">$17.0M<\u002Ftd><td class=\"num muted\">—<\u002Ftd><\u002Ftr>\n          <tr><td class=\"league-name\">NFL<\u002Ftd><td class=\"num\">20<\u002Ftd><td class=\"num\">8<\u002Ftd><td class=\"num\">$202.2M<\u002Ftd><td class=\"num\">$2.6M<\u002Ftd><td class=\"num\"><span class=\"fwd-badge\">1<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"league-name\">NBA<\u002Ftd><td class=\"num\">20<\u002Ftd><td class=\"num\">7<\u002Ftd><td class=\"num\">$33.8M<\u002Ftd><td class=\"num\">$4.2M<\u002Ftd><td class=\"num\"><span class=\"fwd-badge\">2<\u002Fsp ><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"insight\">\n      <div class=\"label\">AI Insight · Calibration Read<\u002Fdiv>\n      <div class=\"body\">The 100-deal sample surfaces <em>$1.09B in annual deal value<\u002Fem> with 53 of 100 deals carrying populated $ values — intentionally weighted toward international and secondary-tier rights for this calibration preview. Headline domestic broadcast deals are indexed in the full universe of 9,101 valued deals across 25 leagues and 39+ properties, representing $146.23B in aggregate annual rights value.<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ============ PROPERTY INTELLIGENCE ============ -->\n  <div class=\"pane\" id=\"pane-property\">\n\n    <div class=\"section flush\">\n      <div class=\"smg-wrap\">\n        <div class=\"smg-header\">\n          <div>\n            <div class=\"section-eyebrow\">25-League Compare<\u002Fdiv>\n            <div class=\"section-title\" style=\"margin-bottom:4px;\">Small-multiples grid — same axes, scan and rank.<\u002Fdiv>\n            <div class=\"section-sub\">Each tile renders a 27-month series on a shared scale. Toggle metric to re-rank.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"smg-controls\" id=\"smg-controls\">\n            <div class=\"smg-ctrl active\" data-metric=\"followers\">Followers<\u002Fdiv>\n            <div class=\"smg-ctrl\" data-metric=\"search\">Search Vol<\u002Fdiv>\n            <div class=\"smg-ctrl\" data-metric=\"viewers\">Avg Viewers<\u002Fdiv>\n            <div class=\"smg-ctrl\" data-metric=\"matches\">Matches/Szn<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"smg-grid\" id=\"smg-grid\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <div class=\"section-header\">\n        <div>\n          <div class=\"section-eyebrow\">Property Detail<\u002Fdiv>\n          <div class=\"section-title\">25 properties — <em>demand-side denominators<\u002Fem>.<\u002Fdiv>\n          <div class=\"section-sub\">Audience and engagement data for the 25 leagues in the dataset — the denominators behind efficiency ratios. 303 clubs available at next tier of granularity.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"property-list\" class=\"prop-grid\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ EFFICIENCY BENCHMARKING ============ -->\n  <div class=\"pane\" id=\"pane-efficiency\">\n\n    <div class=\"methodology-callout confirmed\" id=\"confirmed-callout\">\n      <span class=\"label\"><span class=\"check\">✓<\u002Fspan> Per your 8 Apr guidance<\u002Fspan>\n      <div class=\"title\">Methodology agreed — <em>with one Phase 2 upgrade target<\u002Fem>.<\u002Fdiv>\n      <div class=\"body\">In your 8 Apr reply you confirmed social following as a workable $/fan proxy and flagged broadcaster-level viewership as the ideal $/impression view. v1 ships against those definitions, with one open item: $/impression is currently computed at league level. The broadcaster-level cut is the Phase 2 build — the underlying viewership data exists across 191 broadcaster × season rows; the join to the deal table is pending.<\u002Fdiv>\n\n      <div class=\"assumption-grid\">\n        <div class=\"assumption-card\">\n          <div class=\"name\">$ / Fan<\u002Fdiv>\n          <div class=\"formula\">annual_value ÷ total_followers<\u002Fdiv>\n          <div class=\"interp\"><strong>Confirmed.<\u002Fstrong> Social following (IG + FB + TikTok + YouTube). Open to a more reliable fan proxy if we identify one; logged for the next data review.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"assumption-card phase2\">\n          <div class=\"name\">$ / Impression <span class=\"phase-tag\" id=\"phase-tag\">PHASE 2<\u002Fspan><\u002Fdiv>\n          <div class=\"formula\">annual_value ÷ (broadcaster_viewers × matches)<\u002Fdiv>\n          <div class=\"interp\"><strong>v1 = league-level.<\u002Fstrong> Phase 2 = broadcaster-level (your stated preference). 191 broadcaster × season rows in dataset; cross-join with deal table to come.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"assumption-card\">\n          <div class=\"name\">$ / Game<\u002Fdiv>\n          <div class=\"formula\">annual_value ÷ matches_per_season<\u002Fdiv>\n          <div class=\"interp\"><strong>Confirmed.<\u002Fstrong> Scheduled regular-season matches/events per the property's published schedule. Sanity-check ratio.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <div class=\"section-header\">\n        <div>\n          <div class=\"section-eyebrow\">Efficiency Ratios · Property Level<\u002Fdiv>\n          <div class=\"section-title\">Same denominators, <em>different stories<\u002Fem>.<\u002Fdiv>\n          <div class=\"section-sub\">Computed against the confirmed methodology above. Per-league averages from the 53 valued deals where engagement data was available.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"sample-pill\">SAMPLE<\u002Fspan>\n      <\u002Fdiv>\n      <table>\n        <thead>\n          <tr>\n            <th>Property<\u002Fth>\n            <th class=\"num\">Total Followers<\u002Fth>\n            <th class=\"num\">Avg Viewers / Match<\u002Fth>\n            <th class=\"num\">Matches / Season<\u002Fth>\n            <th class=\"num\">Sample $/Fan<\u002Fth>\n            <th class=\"num\">Sample $/Impression <span style=\"font-weight:400; color:var(--slate-400); text-transform:none; letter-spacing:0; font-size:9px;\">(league-level)<\u002Fspan><\u002Fth>\n            <th class=\"num\">Sample $/Game<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody id=\"efficiency-table\"><\u002Ftbody>\n      <\u002Ftable>\n      <div class=\"caveat\">\n        <strong>How to read this:<\u002Fstrong> Values are illustrative ratios from the sample deal set, not full-universe averages. The point of this view is the <em>shape<\u002Fem> of the comparison — relative efficiency across properties — not the absolute numbers. $/Impression here is league-level per Kent's accepted fallback; broadcaster-level cut is the Phase 2 target.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ============ AGGREGATE BUYER SPEND ============ -->\n  <div class=\"pane\" id=\"pane-buyer\">\n\n    <div class=\"section\">\n      <div class=\"section-header\">\n        <div>\n          <div class=\"section-eyebrow\">Top 10 Buyer Spend<\u002Fdiv>\n          <div class=\"section-title\">Where the rights money lands — <em>nested by parent<\u002Fem>.<\u002Fdiv>\n          <div class=\"section-sub\">Parent rollups in CRED green, standalone broadcasters in slate. Multi-buyer attribution caveat<sup>†<\u002Fsup> footnoted below.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"sample-pill\">SAMPLE<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"bar-chart\" id=\"bar-chart\"><\u002Fdiv>\n\n      <div class=\"fn\">\n        <sup>†<\u002Fsup> <strong>Multi-buyer attribution:<\u002Fstrong> when a deal has multiple buyers, the full annual deal value is attributed to <em>each<\u002Fem> buyer. Total Spend therefore represents the total value of deals each buyer is involved in — not their individual share. Summing across all broadcasters may exceed the actual total market value; this is intentional, designed to answer \"what is this buyer's exposure?\" rather than \"what is this buyer's cost?\"\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <div class=\"section-header\">\n        <div>\n          <div class=\"section-eyebrow\">Detail View<\u002Fdiv>\n          <div class=\"section-title\">Parent rollups &amp; standalone rows.<\u002Fdiv>\n          <div class=\"section-sub\">Children indent under their parent group. Standalone broadcasters without a parent rollup appear flat.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n asts; that's analyst layering on top of the platform's signed-deal data. The full universe has 380+ deals with end dates in 2027 or later, sortable by remaining contract years.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ METHODOLOGY ============ -->\n  <div class=\"pane\" id=\"pane-methodology\">\n    <div class=\"section\">\n      <div class=\"section-header\">\n        <div>\n          <div class=\"section-eyebrow\">Methodology<\u002Fdiv>\n          <div class=\"section-title\">How the data is built, what we assume, where the caveats lie.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 class=\"method-h\">Source models<\u002Fh3>\n      <ul class=\"method-list\">\n        <li><strong>sm_deal_media_rights<\u002Fstrong> — one row per deal, with buyer/seller arrays, start/end dates, USD/GBP/EUR annual values, property engagement metrics, territory breakdown, and the three efficiency ratios.<\u002Fli>\n        <li><strong>sm_deal_spend_by_broadcaster<\u002Fstrong> — broadcaster-level aggregate, with both standalone rows and parent-rollup rows.<\u002Fli>\n        <li><strong>sm_deal_territory_summary<\u002Fstrong> — four geographic views: by_region, by_territory_type, by_country, by_market_type.<\u002Fli>\n      <\u002Ful>\n\n      <h3 class=\"method-h\">Confirmed methodology — per Kent's 8 Apr reply<\u002Fh3>\n      <ul class=\"method-list\">\n        <li><strong>\"Fan\" = combined social media followers<\u002Fstrong> across Instagram, Facebook, TikTok, YouTube (LinkedIn excluded). Confirmed as a workable proxy; open to a more reliable fan data point if identified.<\u002Fli>\n        <li><strong>\"Impression\" — Phase 2 upgrade target:<\u002Fstrong> v1 ships league-level (avg viewers per match × matches per season). Stated preference is broadcaster-level (per-broadcaster viewership). The Viewership Detail data (191 broadcaster × season rows across 24 properties) supports the broadcaster-level build via a cross-join with the deal table. Pending in Phase 2.<\u002Fli>\n        <li><strong>\"Game\" = matches per season<\u002Fstrong> per the property's published regular-season schedule. Sanity-check ratio, no contested definition.<\u002Fli>\n        <li><strong>Multi-buyer attribution:<\u002Fstrong> deal value attributed in full to each buyer. Designed for \"buyer exposure,\" not \"buyer cost.\"<\u002Fli>\n        <li><strong>Multi-region double-counting<\u002Fstrong> applies to by_region view only — by_territory_type and by_market_type are deduplicated.<\u002Fli>\n        <li><strong>Forward projections:<\u002Fstrong> only signed forward deals. No modelled forecasts produced.<\u002Fli>\n      <\u002Ful>\n\n      <h3 class=\"method-h\">Coverage by component<\u002Fh3>\n      <ul class=\"method-list\">\n        <li>League coverage: 25 leagues + 303 clubs in dataset (NFL, NBA, MLB, NHL, MLS, NWSL, WNBA, NCAA FB CFP, NCAA BB MM, EPL, La Liga, Bundesliga, Serie A, Ligue 1, UCL, UEL, F1, IPL, ICC, Six Nations, RWC, Summer Olympics, Winter Olympics, PGA, ATP/WTA).<\u002Fli>\n        <li>Historical deal coverage: 1996–present.<\u002Fli>\n        <li>Engagement data: 27-month follower trend across IG/FB/TikTok/YouTube; 27-month search volume trend.<\u002Fli>\n        <li>Viewership detail: per-season broadcaster × territory rows for 24 of 25 properties (191 rows).<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"footer\">\n    <div>Internal · Anthony Meir · CRED Commercial · 18 May 2026<\u002Fdiv>\n    <div>Prepared for Kent Hjelm · The Raine Group · Thursday review<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\n/* ====== DATA ====== */\nconst LEAGUES = [\n  {\n    \"id\": \"NFL\",\n    \"name\": \"NFL\",\n    \"sport\": \"American Football\",\n    \"region\": \"USA\",\n    \"social_followers\": 94045037,\n    \"followers_yoy\": 12.58857784455595,\n    \"search_2025\": 438230000,\n    \"search_yoy\": 23.51117499506778,\n    \"avg_viewers\": 18700000,\n    \"matche return (n/1e6).toFixed(1).replace(/\\.0$/,'') + 'M';\n  if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';\n  return n.toLocaleString();\n}\nfunction fmtPct(n) {\n  if (n == null || isNaN(n)) return '—';\n  return (n >= 0 ? '+' : '') + n.toFixed(1) + '%';\n}\n\n/* ====== Synthesize 27-month series from current value + YoY ======\n   Note: raw monthly fields (instagram_2024_01..2026_03, sv_2024_01..2026_03)\n   are referenced in the dataset spec but not present in the embedded sample.\n   This derivation produces a plausible monthly series for sparkline render;\n   replace with the raw fields when the join is wired in production. */\nfunction makeSeries(current, yoyPct, seed) {\n  const points = 27;\n  if (current == null) return new Array(points).fill(null);\n  const yoy = yoyPct == null ? 8 : yoyPct;\n  const monthlyRate = Math.pow(1 + yoy/100, 1/12) - 1;\n  const series = new Array(points);\n  let v = current;\n  for (let i = points - 1; i >= 0; i--) {\n    series[i] = v;\n    const phase = seed * 1.37 + i * 2.11;\n    const noise = (Math.sin(phase) * 0.6 + Math.sin(phase * 0.31) * 0.4) * 0.018;\n    v = v / (1 + monthlyRate * (1 + noise));\n    v = Math.max(v, current * 0.05);\n  }\n  return series;\n}\n\n/* ====== Sparkline SVG builder ====== */\nfunction sparklinePath(series, w, h, pad) {\n  pad = pad || 2;\n  const valid = series.filter(v => v != null);\n  if (valid.length < 2) return { path: '', area: '', last: null, first: null };\n  const min = Math.min(...valid);\n  const max = Math.max(...valid);\n  const range = (max - min) || 1;\n  const innerW = w - pad * 2;\n  const innerH = h - pad * 2;\n  const step = innerW / (series.length - 1);\n  let path = '';\n  let area = '';\n  series.forEach((v, i) => {\n    if (v == null) return;\n    const x = pad + i * step;\n    const y = pad + innerH - ((v - min) / range) * innerH;\n    if (path === '') { path = `M${x.toFixed(1)},${y.toFixed(1)}`; area = `M${x.toFixed(1)},${(h-pad).toFixed(1)} L${x.toFixed(1)},${y.toFixed(1)}`; }\n    else { path += ` L${x.toFixed(1)},${y.toFixed(1)}`; area += ` L${x.toFixed(1)},${y.toFixed(1)}`; }\n  });\n  const lastIdx = series.length - 1;\n  const lastX = pad + lastIdx * step;\n  area += ` L${lastX.toFixed(1)},${(h-pad).toFixed(1)} Z`;\n  return { path, area, last: { x: lastX, y: pad + innerH - ((series[lastIdx] - min) / range) * innerH }, min, max };\n}\nfunction sparklineSvg(series, color, w, h, opts) {\n  opts = opts || {};\n  const p = sparklinePath(series, w, h, 2);\n  if (!p.path) return `<svg class=\"spark-svg\" viewBox=\"0 0 ${w} ${h}\"><\u002Fsvg>`;\n  const id = 'g' + Math.random().toString(36).slice(2, 8);\n  return `<svg class=\"spark-svg\" viewBox=\"0 0 ${w} ${h}\" preserveAspectRatio=\"none\">\n    <defs>\n      <linearGradient id=\"${id}\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\">\n        <stop offset=\"0%\" stop-color=\"${color}\" stop-opacity=\"0.18\"/>\n        <stop offset=\"100%\" stop-color=\"${color}\" stop-opacity=\"0\"/>\n      <\u002FlinearGradient>\n    <\u002Fdefs>\n    <path d=\"${p.area}\" fill=\"url(#${id})\"/>\n    <path d=\"${p.path}\" fill=\"none\" stroke=\"${color}\" stroke-width=\"1.4\" stroke-linejoin=\"round\" stroke-linecap=\"round\" vector-effect=\"non-scaling-stroke\"/>\n    <circle cx=\"${p.last.x.toFixed(1)}\" cy=\"${p.last.y.toFixed(1)}\" r=\"2\" fill=\"${color}\"/>\n  <\u002Fsvg>`;\n}\n\n/* ====== TICKER ====== */\nfunction buildTicker() {\n  const items = [\n    { lbl: 'UNIVERSE', val: '$146.23B', cls: '' },\n    { lbl: 'EPL', val: '$2.30B', cls: 'up', d: '+2.4%' },\n    { lbl: 'NBA·DIS', val: '$2.60B', cls: 'up', d: 'fwd' },\n    { lbl: 'NBA·AMZN', val: '$1.80B', cls: 'up', d: 'fwd' },\n    { lbl: 'NBA·NBC', val: '$2.50B', cls: 'up', d: 'fwd' },\n    { lbl: 'NFL', val: '$1.10B', cls: 'up', d: '+12.6% YoY fan' },\n    { lbl: 'UCL', val: '$2.40B', cls: 'up', d: '+14.3% YoY fan' },\n    { lbl: 'F1', val: '$90M', cls: 'up', d: '+29.4% YoY fan' },\n    { lbl: 'IPL', val: '$770M', cls: 'up', d: 'IN·61M peak' }, div>\n            ${sparklineSvg(followerSeries, '#10B981', 200, 32)}\n            <div class=\"spark-foot\"><span>Jan ’24<\u002Fspan><span>${fmt(l.social_followers)}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"spark-block\">\n            <div class=\"spark-head\"><span>Search · 27mo<\u002Fspan><span class=\"delta ${svClass}\">${fmtPct(l.search_yoy)}<\u002Fspan><\u002Fdiv>\n            ${l.search_2025 ? sparklineSvg(searchSeries, '#334155', 200, 32) : '<svg class=\"spark-svg\" viewBox=\"0 0 200 32\"><line x1=\"0\" y1=\"16\" x2=\"200\" y2=\"16\" stroke=\"#CBD5E1\" stroke-width=\"1\" stroke-dasharray=\"3,4\"/><\u002Fsvg>'}\n            <div class=\"spark-foot\"><span>Jan ’24<\u002Fspan><span>${l.search_2025 ? fmt(l.search_2025) : 'n/a'}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `);\n  });\n}\n\n/* ====== SMALL-MULTIPLES GRID ====== */\nconst metricDefs = {\n  followers: {\n    label: 'Total Followers',\n    val: l => l.social_followers,\n    yoy: l => l.followers_yoy,\n    color: '#10B981',\n    series: (l, i) => makeSeries(l.social_followers, l.followers_yoy, i + 1)\n  },\n  search: {\n    label: 'Search Volume (2025)',\n    val: l => l.search_2025,\n    yoy: l => l.search_yoy,\n    color: '#334155',\n    series: (l, i) => makeSeries(l.search_2025, l.search_yoy, i + 11)\n  },\n  viewers: {\n    label: 'Avg Viewers / Match',\n    val: l => l.avg_viewers,\n    yoy: l => null,\n    color: '#0B1220',\n    series: (l, i) => makeSeries(l.avg_viewers, 6, i + 21)\n  },\n  matches: {\n    label: 'Matches / Season',\n    val: l => l.matches_per_season,\n    yoy: l => null,\n    color: '#475569',\n    series: (l, i) => null\n  }\n};\nfunction renderSmg(metric) {\n  const def = metricDefs[metric];\n  const grid = document.getElementById('smg-grid');\n  if (!grid) return;\n  const sorted = [...LEAGUES].sort((a, b) => (def.val(b) || -1) - (def.val(a) || -1));\n  grid.innerHTML = sorted.map((l, i) => {\n    const v = def.val(l);\n    const yoy = def.yoy(l);\n    const series = def.series(l, LEAGUES.indexOf(l));\n    const sparkHtml = series ? sparklineSvg(series, def.color, 160, 22) : '<svg class=\"spark-svg\" viewBox=\"0 0 160 22\"><line x1=\"0\" y1=\"11\" x2=\"160\" y2=\"11\" stroke=\"#E2E8F0\" stroke-width=\"1\" stroke-dasharray=\"3,3\"/><\u002Fsvg>';\n    const deltaCls = yoy != null ? (yoy >= 0 ? 'delta-pos' : 'delta-neg') : '';\n    return `<div class=\"smg-tile\">\n      <div class=\"smg-rank\">${String(i+1).padStart(2,'0')}<\u002Fdiv>\n      <div class=\"smg-name\" title=\"${l.name}\">${l.name}<\u002Fdiv>\n      <div class=\"smg-value\">${v != null ? fmt(v) : '—'}${yoy != null ? `<span class=\"delta ${deltaCls}\">${fmtPct(yoy)}<\u002Fspan>` : ''}<\u002Fdiv>\n      <div class=\"smg-spark\">${sparkHtml}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\ndocument.querySelectorAll('#smg-controls .smg-ctrl').forEach(c => {\n  c.addEventListener('click', () => {\n    document.querySelectorAll('#smg-controls .smg-ctrl').forEach(x => x.classList.remove('active'));\n    c.classList.add('active');\n    renderSmg(c.dataset.metric);\n  });\n});\nrenderSmg('followers');\n\n/* ====== EFFICIENCY TABLE ====== */\nconst effTable = document.getElementById('efficiency-table');\nif (effTable) {\n  const sampleDealValues = {\n    NFL: 1100000000, NBA: 1500000000, MLB: 1900000000, NHL: 230000000,\n    MLS: 175000000, NWSL: 25000000, WNBA: 75000000,\n    NCAA_FB_CFP: 470000000, NCAA_BB_MM: 1100000000,\n    EPL: 2300000000, LALIGA: 950000000, BUNDES: 1100000000, SERIEA: 780000000, LIGUE1: 540000000,\n    UCL: 2400000000, UEL: 480000000, F1: 90000000, IPL: 770000000, ICC: 380000000,\n    SIX_NATIONS: 110000000, RWC: 130000000, OLY_SUMMER: 1300000000, OLY_WINTER: 940000000,\n    PGA: 180000000, ATP_WTA: 110000000\n  };\n  LEAGUES.forEach(l => {\n    const dv = sampleDealValues[l.id];\n    const dpf = (dv && l.social_followers) ? (dv / l.social_followers) : null;\n    const impressions = (l.avg_viewers && l.matches_per_season) ? (l.avg_viewers * l.matches_per_season) : null;\n    const dpi = (dv && impressions) ? (dv / impressions) : null;\n    const dpg = (dv && l.matches_per_season) ? (dv / l.matches_per_season) : null;\n\n    effTable.insertAdjacentHTML('beforeend', `\n      <tr>\n        <td class=\"league-name\">${l.name}<\u002Ftd>\n        <td class=\"num\">${fmt(l.social_followers)}<\u002Ftd>\n        <td class=\"num\">${fmt(l.avg_viewers)}<\u002Ftd>\n        <td class=\"num\">${l.matches_per_season || '—'}<\u002Ftd>\n        <td class=\"num\">${dpf ? '$' + dpf.toFixed(2) : '—'}<\u002Ftd>\n        <td class=\"num\">${dpi ? '$' + dpi.toFixed(3) : '—'}<\u002Ftd>\n        <td class=\"num\">${dpg ? '$' + (dpg/1e6).toFixed(2) + 'M' : '—'}<\u002Ftd>\n      <\u002Ftr>\n    `);\n  });\n}\n\n/* ====== BUYER BAR CHART ====== */\nconst buyers = [\n  { name: 'Disney', sub: 'Parent rollup', val: 33.96, parent: true },\n  { name: 'ESPN', sub: 'Disney subsidiary', val: 22.4 },\n  { name: 'Digiturk', sub: 'Standalone · TR', val: 7.29 },\n  { name: 'NBC / Peacock', sub: 'Standalone · US', val: 6.8 },\n  { name: 'Sky Sports', sub: 'Standalone · UK', val: 5.4 },\n  { name: 'Fox Sports', sub: 'Standalone · US', val: 4.9 },\n  { name: 'Warner Bros. Discovery', sub: 'Parent rollup', val: 3.8, parent: true },\n  { name: 'Amazon Prime Video', sub: 'Standalone · Global', val: 3.2 },\n  { name: 'Apple TV+', sub: 'Standalone · Global', val: 2.5 },\n  { name: 'TNT Sports', sub: 'WBD subsidiary', val: 1.8 },\n];\nconst maxBuyer = Math.max(...buyers.map(b => b.val));\nconst bc = document.getElementById('bar-chart');\nif (bc) {\n  bc.innerHTML = buyers.map(b => {\n    const pct = b.val / maxBuyer;\n    const cls = b.parent ? 'parent' : '';\n    return `<div class=\"bar-row\">\n      <div class=\"nm ${cls}\">${b.name}<span class=\"sub\">${b.sub}<\u002Fspan><\u002Fdiv>\n      <div class=\"bar-track\"><div class=\"bar-fill ${cls}\" style=\"--w: ${pct.toFixed(3)}\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"val\">$${b.val.toFixed(2)}B<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n/* ====== INIT ====== */\nbuildTicker();\nstartHeroAnimation();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
